<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Task Manager</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1F4E78; text-align: center; margin-bottom: 30px; }
        .input-group { display: flex; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; font-size: 16px; }
        button { padding: 12px 20px; border: none; background-color: #1F4E78; color: white; font-size: 16px; border-radius: 0 4px 4px 0; cursor: pointer; }
        button:hover { background-color: #153956; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f9f9f9; margin-bottom: 10px; border-radius: 4px; border-left: 5px solid #1F4E78; }
        .delete-btn { color: #ff4d4d; text-decoration: none; font-weight: bold; }
        .delete-btn:hover { color: #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <h1>📋 VIP Task Manager</h1>
    
    <form action="/add" method="POST" class="input-group">
        <input type="text" name="title" placeholder="नया टास्क यहाँ लिखें..." required>
        <button type="submit">जोड़ें</button>
    </form>

    <ul>
        {% for task in tasks %}
        <li>
            <span>{{ task[1] }}</span>
            <a href="/delete/{{ task[0] }}" class="delete-btn">❌ हटाएं</a>
        </li>
        {% else %}
        <li style="border-left: 5px solid #ccc; justify-content: center; color: #777;">कोई टास्क नहीं है। आप फ्री हैं! 😎</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
